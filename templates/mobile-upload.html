<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MageMirror Upload</title>

<style>

body {

    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;

}

h2 {

    text-align: center;

}

.button-group {

    display: flex;
    gap: 10px;
    margin-top: 20px;

}

button {

    flex: 1;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;

}

.preview-container {

    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;

}

.preview-item {

    width: 100px;
    height: 100px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ccc;
    position: relative;

}

.preview-item img {

    width: 100%;
    height: 100%;
    object-fit: cover;

}

.status {

    margin-top: 15px;
    font-weight: bold;

}

.counter {

    margin-top: 10px;
    font-size: 16px;

}

</style>

</head>

<body>

<h2>📸 MageMirror 批量上传衣物</h2>

<!-- 隐藏输入 -->

<input
type="file"
accept="image/*"
capture="environment"
multiple
id="cameraInput"
style="display:none">

<input
type="file"
accept="image/*"
multiple
id="fileInput"
style="display:none">


<!-- 按钮 -->

<div class="button-group">

<button onclick="openCamera()">
📸 拍照
</button>

<button onclick="openGallery()">
🖼 相册
</button>

</div>


<div class="counter">

已选择：

<span id="count">0</span> 张

</div>


<div
class="preview-container"
id="previewContainer">
</div>


<button onclick="uploadImages()">
⬆ 批量上传
</button>


<div class="status" id="status">
</div>


<script>

const cameraInput =
document.getElementById("cameraInput");

const fileInput =
document.getElementById("fileInput");

const previewContainer =
document.getElementById("previewContainer");

const countText =
document.getElementById("count");

const statusText =
document.getElementById("status");

let selectedFiles = [];



function openCamera() {

cameraInput.click();

}

function openGallery() {

fileInput.click();

}



cameraInput.addEventListener(
"change",
handleFiles
);

fileInput.addEventListener(
"change",
handleFiles
);



function handleFiles(event) {

const files = event.target.files;

for (let i = 0; i < files.length; i++) {

selectedFiles.push(files[i]);

}

renderPreview();

}



function renderPreview() {

previewContainer.innerHTML = "";

countText.textContent =
selectedFiles.length;

selectedFiles.forEach(file => {

const reader =
new FileReader();

reader.onload = function(e) {

const div =
document.createElement("div");

div.className =
"preview-item";

const img =
document.createElement("img");

img.src =
e.target.result;

div.appendChild(img);

previewContainer.appendChild(div);

};

reader.readAsDataURL(file);

});

}



async function uploadImages() {

if (selectedFiles.length === 0) {

alert("请先选择图片");

return;

}

const formData = new FormData();

selectedFiles.forEach(file => {

formData.append(
"files",
file
);

});

statusText.innerText =
"正在批量上传...";

try {

const response =
await fetch(
"/upload-clothes",
{
method: "POST",
body: formData
}
);

if (response.ok) {

statusText.innerText =
"批量上传成功 ✅";

selectedFiles = [];

previewContainer.innerHTML = "";

countText.textContent = 0;

}
else {

statusText.innerText =
"上传失败 ❌";

}

}
catch (error) {

statusText.innerText =
"上传错误 ❌";

}

}

</script>

</body>

</html>
